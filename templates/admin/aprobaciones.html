{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-5">
    <div>
        <a href="{{ url_for('admin_bp.dashboard') }}" class="btn btn-sm btn-outline-secondary rounded-pill mb-2">
            <i class="fa-solid fa-arrow-left me-1"></i> Dashboard
        </a>
        <h2 class="fw-bold text-tekfix-main mb-0">
            <i class="fa-solid fa-bell-concierge me-2" style="color: var(--tekfix-primary);"></i>Aprobaciones de Precio
        </h2>
        <p class="text-tekfix-sec">Solicitudes pendientes de autorizacion del vendedor
            <span class="badge rounded-pill ms-1" style="background:var(--tekfix-primary); color:var(--tekfix-bg); font-size:.75rem;" id="badge-total">...</span>
            <span class="badge rounded-pill" style="background:rgba(221,184,86,.15); color:var(--tekfix-primary); border:1px solid var(--tekfix-primary); font-size:.7rem;">
                <i class="fa-solid fa-circle-notch fa-spin me-1"></i>En vivo cada 4 s
            </span>
        </p>
    </div>
</div>

<!-- Contenedor principal de solicitudes -->
<div id="lista-aprobaciones"></div>

<style>
.aprov-card {
    animation: slideIn .3s ease-out;
    transition: opacity .3s, transform .3s;
}
@keyframes slideIn {
    from { opacity:0; transform: translateY(-10px); }
    to   { opacity:1; transform: translateY(0); }
}
</style>

<script>
(function() {
    'use strict';
    const csrf = "{{ csrf_token() }}";
    const fmt  = n => '$' + Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
    let lista  = [];

    async function cargar() {
        try {
            const r = await fetch('/admin/aprobaciones');
            if (!r.ok) return;
            lista = await r.json();
            render(lista);
        } catch(e) {}
    }

    function render(items) {
        const cont  = document.getElementById('lista-aprobaciones');
        const badge = document.getElementById('badge-total');
        if (badge) badge.textContent = items.length;

        if (items.length === 0) {
            cont.innerHTML = `
            <div class="card card-custom p-5 text-center">
                <i class="fa-solid fa-circle-check fa-3x mb-3 d-block" style="color:var(--tekfix-primary); opacity:.5;"></i>
                <h5 class="fw-bold text-tekfix-main mb-1">Sin solicitudes pendientes</h5>
                <p class="text-tekfix-sec mb-0">Cuando un vendedor solicite un precio especial, apareceran aqui automaticamente.</p>
            </div>`;
            return;
        }

        cont.innerHTML = items.map(s => {
            const varLabel = s.variante
                ? `<span class="badge bg-tekfix-card text-tekfix-sec border ms-2">${s.variante}</span>`
                : '';
            return `
            <div class="card card-custom aprov-card mb-3 p-4" id="aprov-${s.id}">
                <div class="row align-items-center g-4">

                    <!-- Info producto y vendedor -->
                    <div class="col-lg-5">
                        <div class="d-flex align-items-center gap-3 mb-2">
                            <div style="background:var(--tekfix-primary); border-radius:10px; padding:10px 13px; flex-shrink:0;">
                                <i class="fa-solid fa-tag fa-lg" style="color:var(--tekfix-bg);"></i>
                            </div>
                            <div>
                                <div class="fw-bold text-tekfix-main fs-6">${s.producto} ${varLabel}</div>
                                <small class="text-tekfix-sec">
                                    <i class="fa-solid fa-user me-1"></i>${s.vendedor}
                                    &nbsp;&bull;&nbsp;
                                    <span class="badge bg-warning text-dark rounded-pill" style="font-size:.65rem;">${s.hace}</span>
                                </small>
                            </div>
                        </div>
                        <div class="d-flex gap-4 mt-3">
                            <div class="text-center">
                                <div class="text-tekfix-sec mb-1" style="font-size:.6rem; letter-spacing:.5px; text-transform:uppercase;">Precio Sugerido</div>
                                <div class="fw-bolder text-danger fs-5">${fmt(s.precio_original)}</div>
                            </div>
                            <div class="vr"></div>
                            <div class="text-center">
                                <div class="text-tekfix-sec mb-1" style="font-size:.6rem; letter-spacing:.5px; text-transform:uppercase;">Precio solicitado</div>
                                <div class="fw-bolder fs-5" style="color:var(--tekfix-primary);">${fmt(s.precio_solicitado)}</div>
                            </div>
                            <div class="vr"></div>
                            <div class="text-center">
                                <div class="text-tekfix-sec mb-1" style="font-size:.6rem; letter-spacing:.5px; text-transform:uppercase;">Diferencia</div>
                                <div class="fw-bolder text-danger fs-5">-${fmt(s.precio_original - s.precio_solicitado)}</div>
                            </div>
                        </div>
                    </div>

                    <!-- Precio a autorizar (editable) -->
                    <div class="col-lg-3">
                        <label class="form-label small fw-bold text-tekfix-main mb-1">
                            <i class="fa-solid fa-pen-to-square me-1" style="color:var(--tekfix-primary);"></i>Precio a Autorizar
                        </label>
                        <div class="input-group">
                            <span class="input-group-text fw-bold border-0 bg-tekfix-card" style="color:var(--tekfix-primary);">$</span>
                            <input type="number" step="1"
                                   class="form-control border-0 text-end fw-bold fs-5 shadow-sm"
                                   id="precio-aprob-${s.id}"
                                   value="${Math.round(s.precio_solicitado)}">
                        </div>
                        <small class="text-tekfix-sec" style="font-size:.7rem;">Puedes ajustar el monto antes de aprobar</small>
                    </div>

                    <!-- Botones accion -->
                    <div class="col-lg-4 d-flex flex-column gap-2">
                        <button class="btn btn-success rounded-pill fw-bold py-2 shadow-sm"
                                onclick="aprobar(${s.id})">
                            <i class="fa-solid fa-circle-check me-2"></i>Aprobar Precio
                        </button>
                        <button class="btn btn-outline-danger rounded-pill fw-bold py-2"
                                onclick="rechazar(${s.id})">
                            <i class="fa-solid fa-ban me-2"></i>Rechazar Solicitud
                        </button>
                    </div>

                </div>
            </div>`;
        }).join('');
    }

    window.aprobar = async function(id) {
        const precio = parseFloat(document.getElementById(`precio-aprob-${id}`)?.value) || null;
        const btn    = event.target.closest('button');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin me-2"></i>Procesando...';
        try {
            const r = await fetch(`/admin/aprobaciones/${id}/aprobar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
                body: JSON.stringify({ precio_aprobado: precio })
            });
            if (r.ok) {
                const el = document.getElementById(`aprov-${id}`);
                if (el) { el.style.opacity='0'; el.style.transform='translateX(30px)'; setTimeout(()=>el.remove(), 350); }
                lista = lista.filter(s => s.id !== id);
                setTimeout(() => render(lista), 400);
            } else {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-circle-check me-2"></i>Aprobar Precio';
            }
        } catch(e) { alert('Error al aprobar.'); btn.disabled = false; }
    };

    window.rechazar = async function(id) {
        const motivo = prompt('Motivo del rechazo (opcional, sera visible al vendedor):') || 'Sin motivo especificado.';
        try {
            const r = await fetch(`/admin/aprobaciones/${id}/rechazar`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
                body: JSON.stringify({ motivo })
            });
            if (r.ok) {
                const el = document.getElementById(`aprov-${id}`);
                if (el) { el.style.opacity='0'; setTimeout(()=>el.remove(), 350); }
                lista = lista.filter(s => s.id !== id);
                setTimeout(() => render(lista), 400);
            }
        } catch(e) { alert('Error al rechazar.'); }
    };

    cargar();
    setInterval(cargar, 4000);
})();
</script>
{% endblock %}
