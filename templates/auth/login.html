{% extends "base.html" %}

{% block content %}
<style>
    /* Fondo aplicando colores Tekfix establecidos */
    body {
        background-color: var(--tekfix-bg) !important;
        background-image: none !important;
    }

    /* Opcional: Ocultar la barra solo en login */
    .navbar-custom {
        display: none !important;
    }
</style>

<div class="row align-items-center justify-content-evenly" style="min-height: 85vh;">
    <!-- Columna Izquierda: Cuadro de Acceso Segregado -->
    <div class="col-md-6 col-lg-5 mb-4">
        <div class="card card-custom p-5 border-0 shadow-lg rounded-4 bg-tekfix-card" style="border-top: 5px solid var(--tekfix-primary) !important;">
            <div class="text-center mb-5">
                <h3 class="fw-bold text-tekfix-main">Acceso al Panel</h3>
                <p class="text-tekfix-sec">Introduce tus credenciales operativas</p>
            </div>
            
            <form method="POST" action="/auth/login">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                <div class="mb-4">
                    <label class="form-label fw-bold text-tekfix-main">Correo Electrónico</label>
                    <input type="email" class="form-control form-control-lg bg-tekfix-card border-0" name="email" required placeholder="tu@Tekfix Oficial">
                </div>
                
                <div class="mb-5">
                    <label class="form-label fw-bold text-tekfix-main">Contraseña</label>
                    <input type="password" class="form-control form-control-lg bg-tekfix-card border-0" name="password" required placeholder="••••••••">
                </div>
                
                <div class="d-grid">
                    <button type="submit" class="btn btn-tekfix-secondary btn-lg rounded-pill shadow-sm">
                        Ingresar <i class="fa-solid fa-arrow-right ms-2"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Columna Derecha: Logo Central y Limpio -->
    <div class="col-md-6 col-lg-6 d-none d-md-flex justify-content-center align-items-center text-center">
        <!-- Logo a tamaño incrementado para mayor presencia de marca -->
        <img src="{{ url_for('static', filename='img/Tekfix.png') }}" alt="Identidad Visual Tekfix" class="img-fluid" style="width: 85%; max-width: 650px; filter: drop-shadow(0 20px 30px rgba(255,255,255,0.05));">
    </div>
</div>
{% endblock %}
